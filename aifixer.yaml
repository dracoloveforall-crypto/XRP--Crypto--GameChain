import os
import subprocess
import sys

def run_command(command):
    """Executes a shell command and returns the output."""
    try:
        result = subprocess.run(command, shell=True, capture_output=True, text=True)
        return result.returncode, result.stdout, result.stderr
    except Exception as e:
        return 1, "", str(e)

def fix_repository(repo_name):
    print(f"--- Starting AI Fixer for: {repo_name} ---")

    # 1. Check for Node.js projects (hii-core, strawberry-fi, etc.)
    if os.path.exists("package.json"):
        print("Detected Node.js project. Running npm audit fix...")
        run_command("npm install --package-lock-only")
        code, out, err = run_command("npm audit fix --force")
        if code == 0:
            print("Successfully applied npm security fixes.")

    # 2. Check for Python projects (intel or data tools)
    elif os.path.exists("requirements.txt"):
        print("Detected Python project. Updating dependencies...")
        run_command("pip install --upgrade -r requirements.txt")

    # 3. Universal Lint/Syntax Check (Prettier)
    print("Running global format check...")
    run_command("npx prettier --write .")

    # 4. Git Status Check
    code, out, err = run_command("git status --porcelain")
    if out:
        print("Changes detected. Preparing to commit fixes.")
        return True
    
    print("No fixes required at this time.")
    return False

if __name__ == "__main__":
    repo = os.getenv("REPO_NAME", "unknown-repo")
    needs_commit = fix_repository(repo)
    if not needs_commit:
        sys.exit(0) # Exit cleanly if no changes
